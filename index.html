<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1a1612" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Slipbox" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>Slipbox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #1a1612;
      --bg2:       #221e18;
      --bg3:       #2c2620;
      --border:    #3d3530;
      --text:      #e8ddd0;
      --text-dim:  #8a7d70;
      --text-faint:#4a4038;
      --accent:    #c8a96e;
      --accent2:   #7c9e7a;
      --accent3:   #8fa8c8;
      --red:       #c87a6e;
      --tag-bg:    #2a2218;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Instrument Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── TOP BAR ─────────────────────────────────── */
    #topbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      padding-top: max(10px, env(safe-area-inset-top));
    }

    #topbar .logo {
      font-family: 'Libre Baskerville', serif;
      font-style: italic;
      font-size: 17px;
      color: var(--accent);
      letter-spacing: 0.02em;
      margin-right: 4px;
      flex-shrink: 0;
    }

    #search-wrap {
      flex: 1;
      position: relative;
    }
    #search-wrap svg {
      position: absolute;
      left: 9px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim);
      pointer-events: none;
    }
    #search {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Instrument Sans', sans-serif;
      font-size: 14px;
      padding: 7px 10px 7px 32px;
      outline: none;
      transition: border-color .15s;
    }
    #search:focus { border-color: var(--accent); }

    #btn-new {
      background: var(--accent);
      color: #1a1612;
      border: none;
      border-radius: 8px;
      font-family: 'Instrument Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      padding: 7px 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      flex-shrink: 0;
      transition: opacity .15s;
    }
    #btn-new:active { opacity: .75; }

    /* ── LAYOUT ──────────────────────────────────── */
    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── SIDEBAR ─────────────────────────────────── */
    #sidebar {
      width: 260px;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
    }

    @media (max-width: 680px) {
      #sidebar {
        width: 100%;
        position: absolute;
        z-index: 10;
        top: 0; left: 0; right: 0; bottom: 0;
        transform: translateX(0);
        transition: transform .25s ease;
      }
      #sidebar.hidden { transform: translateX(-100%); }
      #editor-panel { width: 100%; }
    }

    /* filter tabs */
    #filter-tabs {
      display: flex;
      padding: 8px 10px 0;
      gap: 4px;
      flex-shrink: 0;
    }
    .ftab {
      font-size: 12px;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid transparent;
      cursor: pointer;
      color: var(--text-dim);
      background: transparent;
      transition: all .15s;
    }
    .ftab.active { background: var(--bg3); border-color: var(--border); color: var(--text); }

    /* tag strip */
    #tag-strip {
      display: flex;
      gap: 5px;
      padding: 6px 10px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    .tag-pill {
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      padding: 2px 8px;
      border-radius: 4px;
      background: var(--tag-bg);
      border: 1px solid var(--border);
      color: var(--text-dim);
      cursor: pointer;
      transition: all .15s;
    }
    .tag-pill.active { border-color: var(--accent); color: var(--accent); }

    /* card list */
    #card-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px 8px;
    }
    #card-list::-webkit-scrollbar { width: 4px; }
    #card-list::-webkit-scrollbar-track { background: transparent; }
    #card-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .card {
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid transparent;
      cursor: pointer;
      margin-bottom: 4px;
      transition: all .12s;
    }
    .card:hover { background: var(--bg3); border-color: var(--border); }
    .card.active { background: var(--bg3); border-color: var(--accent); }

    .card-header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 3px;
    }
    .card-type-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .card-id {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text-faint);
    }
    .card-date {
      font-size: 10px;
      color: var(--text-faint);
      margin-left: auto;
    }
    .card-title {
      font-family: 'Libre Baskerville', serif;
      font-size: 13px;
      color: var(--text);
      line-height: 1.35;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-preview {
      font-size: 11px;
      color: var(--text-dim);
      line-height: 1.4;
      margin-top: 2px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-tags {
      display: flex;
      gap: 4px;
      margin-top: 5px;
      flex-wrap: wrap;
    }
    .card-tag {
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      padding: 1px 5px;
      border-radius: 3px;
      background: var(--tag-bg);
      color: var(--text-dim);
    }

    /* ── EDITOR PANEL ────────────────────────────── */
    #editor-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }

    #editor-toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    #btn-back {
      display: none;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 5px 10px;
      font-size: 13px;
      cursor: pointer;
    }
    @media (max-width: 680px) { #btn-back { display: flex; align-items: center; gap: 4px; } }

    .type-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      transition: all .15s;
    }
    .type-btn.active { color: var(--text); }
    .dot { width: 8px; height: 8px; border-radius: 50%; }

    #toolbar-right {
      margin-left: auto;
      display: flex;
      gap: 6px;
    }

    .icon-btn {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-dim);
      padding: 5px 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      transition: all .15s;
    }
    .icon-btn:hover { color: var(--text); border-color: var(--accent); }

    #btn-delete {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-dim);
      padding: 5px 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      transition: all .15s;
    }
    #btn-delete:hover { color: var(--red); border-color: var(--red); }

    /* editor body */
    #editor-body {
      flex: 1;
      overflow-y: auto;
      padding: 18px 18px 80px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    #editor-body::-webkit-scrollbar { width: 4px; }
    #editor-body::-webkit-scrollbar-track { background: transparent; }
    #editor-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* empty state */
    #empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--text-faint);
      font-family: 'Libre Baskerville', serif;
      font-style: italic;
      text-align: center;
      padding: 40px;
    }
    #empty-state svg { opacity: .3; }
    #empty-state p { font-size: 15px; line-height: 1.6; }

    /* field labels */
    .field-label {
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-faint);
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 4px;
    }

    .field-input {
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      font-family: 'Libre Baskerville', serif;
      font-size: 18px;
      width: 100%;
      padding: 4px 0 6px;
      outline: none;
      transition: border-color .15s;
    }
    .field-input:focus { border-color: var(--accent); }

    #field-id-display {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-faint);
      padding: 2px 0;
    }

    .field-textarea {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Libre Baskerville', serif;
      font-size: 14px;
      line-height: 1.75;
      width: 100%;
      padding: 12px 14px;
      outline: none;
      resize: none;
      min-height: 180px;
      transition: border-color .15s;
    }
    .field-textarea:focus { border-color: var(--accent); }

    /* tags input */
    #tags-container {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      align-items: center;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      min-height: 40px;
      cursor: text;
      transition: border-color .15s;
    }
    #tags-container:focus-within { border-color: var(--accent); }
    .tag-item {
      display: flex;
      align-items: center;
      gap: 4px;
      background: var(--tag-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--accent);
    }
    .tag-item button {
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      padding: 0 1px;
    }
    #tag-input {
      background: transparent;
      border: none;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      outline: none;
      min-width: 80px;
      flex: 1;
    }

    /* links section */
    #links-section { display: flex; flex-direction: column; gap: 8px; }
    .link-row {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
    }
    .link-row-id {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--accent3);
    }
    .link-row-title {
      font-size: 13px;
      color: var(--text);
      flex: 1;
    }
    .link-row button {
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 16px;
    }
    .link-row button:hover { color: var(--red); }

    /* link picker */
    #link-picker-wrap {
      position: relative;
    }
    #link-picker-input {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Instrument Sans', sans-serif;
      font-size: 13px;
      padding: 8px 12px;
      width: 100%;
      outline: none;
      transition: border-color .15s;
    }
    #link-picker-input:focus { border-color: var(--accent3); }
    #link-dropdown {
      position: absolute;
      top: calc(100% + 4px);
      left: 0; right: 0;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      z-index: 20;
      display: none;
      max-height: 200px;
      overflow-y: auto;
    }
    .link-option {
      padding: 8px 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background .1s;
    }
    .link-option:hover { background: var(--bg2); }
    .link-option-id {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text-faint);
    }
    .link-option-title { font-size: 13px; color: var(--text); }

    /* save indicator */
    #save-indicator {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: var(--bg3);
      border: 1px solid var(--accent2);
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 11px;
      color: var(--accent2);
      font-family: 'JetBrains Mono', monospace;
      opacity: 0;
      transform: translateY(6px);
      transition: all .3s;
      pointer-events: none;
    }
    #save-indicator.show { opacity: 1; transform: translateY(0); }

    /* type colors */
    .type-fleeting  { background: #c8a96e; }
    .type-permanent { background: #7c9e7a; }
    .type-literature { background: #8fa8c8; }
    .type-structure { background: #b88fc8; }

    /* voice btn */
    #btn-voice {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-dim);
      padding: 5px 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      transition: all .15s;
    }
    #btn-voice.recording { border-color: var(--red); color: var(--red); animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .5; } }

    /* scrollbar global */
    * { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
  </style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <span class="logo">Slipbox</span>
  <div id="search-wrap">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input id="search" type="search" placeholder="Suchen…" />
  </div>
  <button id="btn-new">
    <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
    Neu
  </button>
</div>

<!-- MAIN -->
<div id="main">

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div id="filter-tabs">
      <button class="ftab active" data-type="all">Alle</button>
      <button class="ftab" data-type="fleeting">Flüchtig</button>
      <button class="ftab" data-type="permanent">Permanent</button>
      <button class="ftab" data-type="literature">Literatur</button>
      <button class="ftab" data-type="structure">Struktur</button>
    </div>
    <div id="tag-strip"></div>
    <div id="card-list"></div>
  </div>

  <!-- EDITOR PANEL -->
  <div id="editor-panel">
    <div id="editor-toolbar">
      <button id="btn-back">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
        Zurück
      </button>

      <button class="type-btn active" data-type="fleeting">
        <span class="dot type-fleeting"></span> Flüchtig
      </button>
      <button class="type-btn" data-type="permanent">
        <span class="dot type-permanent"></span> Permanent
      </button>
      <button class="type-btn" data-type="literature">
        <span class="dot type-literature"></span> Literatur
      </button>
      <button class="type-btn" data-type="structure">
        <span class="dot type-structure"></span> Struktur
      </button>

      <div id="toolbar-right">
        <button id="btn-voice" title="Diktat">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <rect x="9" y="2" width="6" height="11" rx="3"/>
            <path d="M5 10a7 7 0 0014 0M12 19v3M9 22h6"/>
          </svg>
        </button>
        <button id="btn-delete" title="Zettel löschen">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/>
          </svg>
        </button>
      </div>
    </div>

    <div id="editor-body">
      <div id="empty-state">
        <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.2" viewBox="0 0 24 24">
          <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M8 7h8M8 11h8M8 15h5"/>
        </svg>
        <p>Wähle einen Zettel<br>oder erstelle einen neuen.</p>
      </div>
    </div>
  </div>

</div>

<div id="save-indicator">gespeichert</div>

<script src="app.js"></script>
</body>
</html>
